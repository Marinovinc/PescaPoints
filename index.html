<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06121f">
<title>PescaPoints — punti di pesca</title>
<link rel="stylesheet" href="lib/leaflet.css">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{ --bg:#06121f; --panel:#0d2137; --line:#1c3556; --txt:#eaf2fa; --dim:#9fb4c9; --acc:#22c8ff; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font:15px/1.45 system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
  #map{position:absolute;inset:0;background:#0a1a2c}
  /* top bar */
  #top{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:8px;padding:0 12px;
    background:linear-gradient(#06121fdd,#06121f99 70%,#06121f00);z-index:1000;pointer-events:none}
  #top .brand{font-weight:800;font-size:18px;letter-spacing:.3px;pointer-events:auto}
  #top .brand small{font-weight:500;color:var(--dim);font-size:11px;display:block;margin-top:-3px}
  #top .sp{flex:1}
  .fab{pointer-events:auto;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:#0d2137e6;
    color:var(--txt);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px #0007}
  /* right side floating column */
  #tools{position:fixed;right:10px;top:60px;z-index:1000;display:flex;flex-direction:column;gap:9px}
  /* bottom sheet */
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:1000;background:var(--panel);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;box-shadow:0 -6px 24px #0009;transition:transform .28s ease;max-height:74vh;overflow:hidden;
    padding-bottom:env(safe-area-inset-bottom)}
  #sheet.min{transform:translateY(calc(100% - 82px))}
  #grip{height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  #grip::before{content:"";width:40px;height:5px;border-radius:3px;background:#3a5a7a}
  #sheetHead{display:flex;align-items:center;gap:10px;padding:0 16px 8px}
  #sheetHead h3{margin:0;font-size:16px} #sheetHead .sp{flex:1}
  #tabs{display:flex;gap:6px;padding:0 12px 8px}
  .tab{flex:1;text-align:center;padding:8px;border-radius:9px;background:#11243c;border:1px solid var(--line);color:var(--dim);font-weight:700;font-size:13px;cursor:pointer}
  .tab.on{background:#173a5c;color:#dff1ff;border-color:#2c6b8a}
  #sheetBody{padding:2px 16px 18px;overflow:auto;max-height:56vh}
  .card{background:#0b1d31;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0}
  .row{display:flex;align-items:center;gap:8px} .muted{color:var(--dim)} .sp{flex:1}
  .big{font-size:26px;font-weight:800} .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid #06121f}
  .pill{display:inline-block;background:#12304f;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px 4px 2px 0}
  .good{color:#7ff0ad;font-weight:700} .warn{color:#ffcf85}
  input[type=date]{background:#11243c;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 8px;font-size:14px}
  .hint{font-size:11px;color:var(--dim);margin-top:6px}

  #legend{position:fixed;left:10px;bottom:96px;z-index:900;background:#0d2137d8;border:1px solid var(--line);border-radius:8px;
    padding:6px 9px;font-size:11px;color:var(--dim);display:none}
  #toast{position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:1200;background:#0d2137f2;border:1px solid var(--line);
    border-radius:10px;padding:8px 14px;font-size:13px;color:var(--txt);box-shadow:0 4px 14px #0009;display:none;max-width:86vw;text-align:center}
</style>

/* ---- MARKER CATTURE ---- */
const catchLayer=L.layerGroup().addTo(map);
function drawCatch(){

  if(!PUBLIC) CATCH.forEach((c,i)=>{   // waypoint storici personali: solo in locale, mai nella versione pubblica

/* ---- ZONE CALDE (KDE pesata dei mark) ---- */
const heatLayer=L.layerGroup(); let heatOn=false;
function drawHeat(){
  heatLayer.clearLayers();
  const W={tonno:1,alalunga:1,spada:1,foraggio:.7,mark:.25};
  const b=map.getBounds(), N=34, bw=0.028;
  const cosLat=Math.cos(ISCHIA[0]*Math.PI/180);
  let cells=[],dmax=0;
  for(let a=0;a<N;a++)for(let k=0;k<N;k++){
    const lat=b.getSouth()+(b.getNorth()-b.getSouth())*(a+.5)/N, lon=b.getWest()+(b.getEast()-b.getWest())*(k+.5)/N;
    let d=0; for(const c of (PUBLIC?userPts:CATCH.concat(userPts))){const dl=c.la-lat,dg=(c.lo-lon)*cosLat,r2=(dl*dl+dg*dg)/(bw*bw); d+=(W[c.sp]||.25)*Math.exp(-.5*r2);}
    if(d>dmax)dmax=d; cells.push([lat,lon,d]);
  }
  if(!dmax) return;
  const cellLat=(b.getNorth()-b.getSouth())/N;
  cells.forEach(([lat,lon,d])=>{ const t=d/dmax; if(t<.5) return;
    const col=t>.8?'#ff2828':(t>.62?'#ff8c1e':'#ffe066');
    L.circleMarker([lat,lon],{radius:9,color:'transparent',fillColor:col,fillOpacity:.10+.30*t,className:'catchMk'}).addTo(heatLayer);
  });
}

/* ---- LUNA / SOLUNAR ---- */
function moonInfo(dstr){
  const d=new Date(dstr); if(isNaN(d.getTime())) return null;
  const ref=Date.UTC(2000,0,6),syn=29.530588853;
  let age=((d.getTime()-ref)/86400000)%syn; if(age<0)age+=syn;
  const illum=Math.round((1-Math.cos(2*Math.PI*age/syn))/2*100);
  let ph,emoji;
  if(age<1.8||age>27.7){ph='Luna nuova';emoji='🌑';}
  else if(age>12.9&&age<16.6){ph='Luna piena';emoji='🌕';}
  else if(age<6.5){ph='Crescente';emoji='🌒';}
  else if(age<8.5){ph='Primo quarto';emoji='🌓';}
  else if(age<12.9){ph='Gibbosa cresc.';emoji='🌔';}
  else if(age<20.2){ph='Gibbosa cal.';emoji='🌖';}
  else if(age<23.9){ph='Ultimo quarto';emoji='🌗';}
  else {ph='Calante';emoji='🌘';}
  const spring=(age<2.8||age>26.7)||(Math.abs(age-14.77)<2.8);
  return {age:age.toFixed(1),illum,ph,emoji,spring};
}
function todayStr(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}

/* ---- FINESTRE DI PESCA (stile Windy: solunar + meteo reali Open-Meteo, stima pesata) ---- */
const PEZO={ major:0.40, moon:0.22, press:0.22, wind:0.16 };   // pesi trasparenti (somma 1)
let fcstCache={key:'',data:null};
function gauss(x,s){ return Math.exp(-0.5*(x/s)*(x/s)); }
function clamp01(x){ return x<0?0:x>1?1:x; }
function hoursOf(iso){ const t=String(iso).slice(11,16).split(':'); return (+t[0])+(+t[1])/60; }  // ora locale da "YYYY-MM-DDTHH:MM"
function hm(x){ let h=Math.floor(x), m=Math.round((x-h)*60); if(m===60){h++;m=0;} return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function moonTransits(dstr){   // approssimazione: transito superiore luna ~ mezzogiorno + ritardo lunare (~50 min/giorno)
  const m=moonInfo(dstr); if(!m) return [12,0.42];
  const lag=(parseFloat(m.age)/29.530588853)*24.84;
  const up=(12+lag)%24, low=(up+12.42)%24;
  return [up,low];
}
async function loadForecast(lat,lon){
  const key=lat.toFixed(2)+','+lon.toFixed(2);
  if(fcstCache.key===key && fcstCache.data) return fcstCache.data;
  const url='https://api.open-meteo.com/v1/forecast?latitude='+lat.toFixed(3)+'&longitude='+lon.toFixed(3)+
    '&hourly=pressure_msl,wind_speed_10m,temperature_2m&daily=sunrise,sunset&timezone=auto&forecast_days=7';
  const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
  const j=await r.json(); fcstCache={key,data:j}; return j;
}
function scoreDays(j){
  const H=j.hourly, D=j.daily, out=[];
  const press=H.pressure_msl, wind=H.wind_speed_10m, times=H.time;
  for(let d=0; d<D.time.length; d++){
    const dstr=D.time[d];
    const majors=[hoursOf(D.sunrise[d]), hoursOf(D.sunset[d]), ...moonTransits(dstr)];
    const mn=moonInfo(dstr), fMoon=0.6+0.4*(Math.abs(mn.illum-50)/50);
    const hourly=[]; let sumP=0,sumW=0,nH=0;
    for(let h=0; h<times.length; h++){
      if(times[h].slice(0,10)!==dstr) continue;
      const hr=hoursOf(times[h]);
      let fMaj=0; for(const e of majors){ let dt=Math.abs(hr-e); dt=Math.min(dt,24-dt); fMaj=Math.max(fMaj,gauss(dt,1.2)); }
      const p=press[h], fPband=gauss(p-1016,10);   // banda pressione selettiva
      const dp=p-(h>=3?press[h-3]:p), fTrend=(dp<0&&dp>-4)?0.15:0;   // lieve calo pressione = bonus
      const fPress=clamp01(fPband+fTrend);
      const w=wind[h], fWind=Math.max(0.15, 1-Math.pow((w-11)/16,2));   // vento moderato ideale, forte penalizzato
      const s=clamp01(PEZO.major*fMaj+PEZO.moon*fMoon+PEZO.press*fPress+PEZO.wind*fWind);
      hourly.push([hr,s]); sumP+=fPress; sumW+=fWind; nH++;
    }
    if(!nH) continue;
    // % del GIORNO (discrimina i giorni): luna + pressione media + vento medio. Alba/tramonto ci sono ogni giorno,
    // quindi NON entrano nella % giornaliera ma solo nella scelta della fascia oraria qui sotto.
    const dayQ=clamp01(0.40*fMoon + 0.35*(sumP/nH) + 0.25*(sumW/nH));
    // fascia migliore + barre: dal punteggio ORARIO (mostra QUANDO nel giorno)
    let mx=0,mxh=12; hourly.forEach(([hr,s])=>{ if(s>mx){mx=s;mxh=hr;} });
    const thr=0.85*mx, byHr={}; hourly.forEach(([hr,s])=>{ const k=Math.round(hr); if(byHr[k]==null||s>byHr[k]) byHr[k]=s; });
    let lo=Math.round(mxh), hi=Math.round(mxh);
    for(let hh=Math.round(mxh); hh>=0; hh--){ if((byHr[hh]||0)>=thr) lo=hh; else break; }
    for(let hh=Math.round(mxh); hh<=23; hh++){ if((byHr[hh]||0)>=thr) hi=hh; else break; }
    const blk=[0,0,0,0], blkN=[0,0,0,0];
    hourly.forEach(([hr,s])=>{ const b=Math.min(3,Math.floor(hr/6)); blk[b]+=s; blkN[b]++; });
    // curva gamma 1.5: lascia spazio in basso -> settimane scarse ~30-50%, ottime ~85-95% (non appiattisce tutto sul 95)
    out.push({ date:dstr, pct:Math.round(100*Math.pow(dayQ,1.5)), lo, hi, blocks:blk.map((v,i)=>blkN[i]?v/blkN[i]:0) });
  }
  return out;
}
function pctColor(p){ return p>=70?'#22e07a':p>=50?'#ffd166':p>=32?'#ff9a3c':'#ff5b5b'; }
async function renderForecast(){
  const el=document.getElementById('fcstBody'); if(!el) return;
  const ctr=map.getCenter();
  try{
    const days=scoreDays(await loadForecast(ctr.lat,ctr.lng));
    if(!days.length){ el.textContent='Nessun dato disponibile.'; return; }
    const dow=['dom','lun','mar','mer','gio','ven','sab'];
    el.innerHTML=days.map(d=>{
      const dt=new Date(d.date+'T12:00'), lbl=dow[dt.getDay()]+' '+d.date.slice(8,10)+'/'+d.date.slice(5,7);
      const bmax=Math.max.apply(null,d.blocks)||1;
      const bar=d.blocks.map(b=>{ const t=b/bmax; return '<span style="display:inline-block;width:15px;height:9px;border-radius:2px;margin-right:2px;background:'+pctColor(Math.round(t*100))+';opacity:'+(0.3+0.7*t).toFixed(2)+'"></span>'; }).join('');
      return '<div class="row" style="margin:6px 0"><div style="width:64px" class="muted">'+lbl+'</div>'+
        '<div style="width:46px"><b style="color:'+pctColor(d.pct)+'">'+d.pct+'%</b></div>'+
        '<div style="width:92px" class="muted">'+hm(d.lo)+'–'+hm(d.hi)+'</div>'+
        '<div title="notte/mattina/pomeriggio/sera">'+bar+'</div></div>';
    }).join('')+'<div class="hint" style="margin-top:6px">Barre = notte / mattina / pomeriggio / sera. Posizione = centro mappa ('+ctr.lat.toFixed(2)+', '+ctr.lng.toFixed(2)+'): sposta la mappa e riapri per aggiornare.</div>';
  }catch(e){ el.innerHTML='<span class="warn">Meteo non disponibile ('+esc(e.message)+'). Serve connessione internet.</span>'; }
}

/* ---- HOT SPOT SUGGERITI (struttura del fondale EMODnet: scarpate/secche, NON catture) ---- */
const spotLayer=L.layerGroup().addTo(map);
let toastT=null;
function toast(msg,ms){ const t=document.getElementById('toast'); t.innerHTML=msg; t.style.display='block';
  if(toastT)clearTimeout(toastT); toastT=setTimeout(()=>{t.style.display='none';}, ms||2600); }
let geotiffLoading=null;
function loadGeotiff(){
  if(window.GeoTIFF) return Promise.resolve();
  if(geotiffLoading) return geotiffLoading;
  geotiffLoading=new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js'; s.onload=()=>res(); s.onerror=()=>rej(new Error('libreria non caricata'));
    document.head.appendChild(s); });
  return geotiffLoading;
}
const WCS_URL='https://ows.emodnet-bathymetry.eu/wcs?service=WCS&version=2.0.1&request=GetCoverage&coverageId=emodnet__mean&format=image/tiff';
async function fetchDepthGrid(latS,latN,lonW,lonE,maxpx){
  const NR=0.0010416666667, sf=Math.min(maxpx/((lonE-lonW)/NR), maxpx/((latN-latS)/NR), 1).toFixed(4);
  const url=WCS_URL+'&subset=Lat('+latS+','+latN+')&subset=Long('+lonW+','+lonE+')&scalefactor='+sf;
  const r=await fetch(url); if(!r.ok) throw new Error('WCS HTTP '+r.status);
  const tiff=await GeoTIFF.fromArrayBuffer(await r.arrayBuffer()), img=await tiff.getImage();
  const data=(await img.readRasters())[0]; let nd=null; try{nd=img.getGDALNoData();}catch(_){}
  if(nd!=null) for(let k=0;k<data.length;k++){ if(data[k]===nd) data[k]=NaN; }
  return {W:img.getWidth(),H:img.getHeight(),data,latS,latN,lonW,lonE};
}
function rankSpots(g){
  const {W,H,data,latS,latN,lonW,lonE}=g;
  const cosLat=Math.cos((latS+latN)/2*Math.PI/180), dLat=(latN-latS)/H, dLon=(lonE-lonW)/W;
  const dyM=dLat*111320, dxM=dLon*111320*cosLat;   // metri per cella
  const cand=[];
  for(let r=1;r<H-1;r++) for(let c=1;c<W-1;c++){
    const z=data[r*W+c]; if(!(z<-3 && z>-2500)) continue;   // in acqua, non abisso
    const zl=data[r*W+c-1],zr=data[r*W+c+1],zu=data[(r-1)*W+c],zd=data[(r+1)*W+c];
    if(![zl,zr,zu,zd].every(isFinite)) continue;
    const dzdx=(zr-zl)/(2*dxM), dzdy=(zd-zu)/(2*dyM), slope=Math.sqrt(dzdx*dzdx+dzdy*dzdy);
    const rise=z-(zl+zr+zu+zd)/4;   // >0 = piu' alto dei vicini = rialzo/secca
    // riga 0 del raster = nord (latN): lat = latN - (r+0.5)*dLat
    const lat=latN-(r+0.5)*dLat, lon=lonW+(c+0.5)*dLon;
    cand.push({lat,lon,z,slope,rise,score:slope+(rise>0?rise*0.02:0)});
  }
  cand.sort((a,b)=>b.score-a.score);
  const span=Math.max(latN-latS,lonE-lonW), minD=span/7, picked=[];
  for(const s of cand){ if(picked.length>=8) break;
    if(picked.every(p=>{const dl=p.lat-s.lat,dg=(p.lon-s.lon)*cosLat; return Math.sqrt(dl*dl+dg*dg)>minD;})) picked.push(s);
  }
  return picked;
}
function spotNav(la,lo){ navTo2(la,lo); return false; }
function drawSpot(sp){
  const slopePct=Math.round(sp.slope*100);
  const type = sp.rise>3?'Secca / rialzo' : (slopePct>=8?'Scarpata ripida':'Struttura di fondale');
  const col  = sp.rise>3?'#ffd166':'#22c8ff';
  L.circleMarker([sp.lat,sp.lon],{radius:9,color:col,weight:2,fillColor:col,fillOpacity:.22,dashArray:'3 3',className:'catchMk'})
    .addTo(spotLayer)
    .bindPopup('<b>'+type+'</b><br>Prof. ~'+Math.abs(Math.round(sp.z))+' m &middot; pendenza '+slopePct+'%'+
      '<br><span style="color:#9fb4c9;font-size:12px">Suggerito dalla <b>struttura del fondale</b>, non una cattura garantita.</span>'+
      '<br><a href="#" style="color:#8df0ff" onclick="return spotNav('+sp.lat.toFixed(5)+','+sp.lon.toFixed(5)+')">🧭 Vai qui</a>');
}
let spotBusy=false;
async function computeHotSpots(){
  if(spotBusy) return; spotBusy=true;
  const b=map.getBounds(), latS=b.getSouth(),latN=b.getNorth(),lonW=b.getWest(),lonE=b.getEast();
  if(Math.max(latN-latS,lonE-lonW)>0.9){ toast('Zooma di più: area troppo grande per proporre hot spot.'); spotBusy=false; return; }
  toast('Analizzo la struttura del fondale…', 8000);
  try{
    await loadGeotiff();
    const spots=rankSpots(await fetchDepthGrid(latS,latN,lonW,lonE,90));
    spotLayer.clearLayers();
    if(!spots.length){ toast('Nessuna struttura evidente in quest\'area.'); spotBusy=false; return; }
    spots.forEach(drawSpot);
    document.getElementById('btnSpot').style.background='#173a5c';
    toast('🎯 '+spots.length+' hot spot suggeriti dalla struttura del fondale (scarpate/secche). Non sono catture.', 4000);
  }catch(err){ toast('Hot spot non disponibili: '+esc(err.message)+' (serve connessione).'); }
  spotBusy=false;
}

/* ---- BOTTOM SHEET ---- */
const sheet=document.getElementById('sheet'), body=document.getElementById('sheetBody');
let curTab='solunar', selDate=todayStr(), selIdx=-1, selT='hist';
document.getElementById('grip').onclick=()=>sheet.classList.toggle('min');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{curTab=t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  sheet.classList.remove('min'); render();});
function selectPoint(t,i){ selT=t; selIdx=i; curTab='point';
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab==='point'));
  sheet.classList.remove('min'); render();
  const c=(t==='user'?userPts:CATCH)[i]; if(c) map.panTo([c.la,c.lo]); }

function render(){
  if(curTab==='solunar'){
    const m=moonInfo(selDate);
    const spr=m.spring?'<span class="good">sizigia — marea forte, giorno favorevole</span>':'<span class="muted">quadratura — marea debole</span>';
    body.innerHTML=
      '<div class="row" style="margin:4px 0 8px"><input type="date" id="solDate" value="'+selDate+'"><div class="sp"></div><button class="tab" style="flex:none;padding:8px 12px" id="solToday">Oggi</button></div>'+
      '<div class="card"><div class="row"><div style="font-size:40px;margin-right:6px">'+m.emoji+'</div><div><div class="big">'+m.illum+'%</div><div class="lbl">'+m.ph+' &middot; '+m.age+' giorni</div></div></div><div style="margin-top:8px">'+spr+'</div></div>'+
      '<div class="card" id="fcstCard"><div class="lbl">Finestre di pesca — prossimi 7 giorni <span class="muted">(stima)</span></div><div id="fcstBody" class="muted" style="margin-top:6px">Carico meteo…</div><div class="hint">Stima pesata: solunar (alba/tramonto/transito luna) 40%, fase luna 22%, pressione 22%, vento 16%. Meteo reale Open-Meteo. <b>Non è una certezza</b>, è un aiuto alla scelta.</div></div>'+
      (PUBLIC
        ? '<div class="card"><div class="lbl">Hot spot dell\'area</div>Premi 🎯 per proporre i punti su <b>scarpate e secche</b> del fondale nell\'area inquadrata: è dove la conformazione concentra foraggio e predatori. <b>Suggerimenti dalla struttura</b>, non catture garantite.</div>'
        : '<div class="card"><div class="lbl">Regola zona</div>Qui i pelagici si prendono <b>sempre negli stessi punti</b>: attiva 🔥 <b>Zone calde</b> per vederli. I modelli meteo-marini non li predicono — contano i <b>tuoi mark</b>. Premi 🎯 per gli hot spot di struttura.</div>');
    const di=document.getElementById('solDate'); if(di) di.onchange=e=>{selDate=e.target.value;render();};
    const bt=document.getElementById('solToday'); if(bt) bt.onclick=()=>{selDate=todayStr();render();};
    renderForecast();
  } else if(curTab==='point'){
    if(selIdx<0){ body.innerHTML='<div class="card muted">Tocca un punto sulla mappa, oppure premi ➕ (o tieni premuto sulla mappa) per aggiungere un tuo punto.</div>'; return; }
    if(selT==='user'){
      const c=userPts[selIdx];
      const opts=['alalunga','tonno','spada','foraggio','mark'].map(s=>'<option value="'+s+'"'+(c.sp===s?' selected':'')+'>'+SPLBL[s]+'</option>').join('');
      body.innerHTML='<div class="card"><div class="lbl" style="color:#7ff0ad">★ Il tuo punto</div>'+
        '<div class="row" style="margin:8px 0"><span>Specie</span><div class="sp"></div><select id="epSp" style="background:#11243c;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 8px;font-size:14px">'+opts+'</select></div>'+
        '<input id="epNm" value="'+esc(c.nm)+'" placeholder="nome / nota" style="width:100%;background:#11243c;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font-size:15px">'+
        '<div class="muted" style="margin-top:6px">'+c.la.toFixed(5)+', '+c.lo.toFixed(5)+'</div>'+
        '<div style="margin-top:10px"><span class="pill" style="background:#1c5a3a;border-color:#2c8a5a" id="epSave">💾 Salva</span><span class="pill" onclick="navTo2('+c.la+','+c.lo+')">🧭 Vai qui</span><span class="pill" style="background:#3a1a1a;border-color:#6c2c2c" id="epDel">🗑 Elimina</span></div></div>';
      document.getElementById('epSave').onclick=()=>{ c.sp=document.getElementById('epSp').value; c.nm=(document.getElementById('epNm').value||'Punto').trim(); saveUser(); drawCatch(); if(heatOn)drawHeat(); render(); };
      document.getElementById('epDel').onclick=()=>{ userPts.splice(selIdx,1); saveUser(); selIdx=-1; drawCatch(); if(heatOn)drawHeat(); render(); };
    } else {
      const c=CATCH[selIdx];
      body.innerHTML='<div class="card"><div class="row"><span class="dot" style="background:'+(SPCOL[c.sp])+'"></span><b>'+SPLBL[c.sp]+'</b><div class="sp"></div><span class="muted">storico #'+(selIdx+1)+'</span></div>'+
        '<div style="margin-top:8px;font-size:17px">'+esc(c.nm)+'</div>'+
        '<div class="muted" style="margin-top:6px">'+c.la.toFixed(5)+', '+c.lo.toFixed(5)+'</div>'+
        '<div style="margin-top:8px"><span class="pill" onclick="navTo2('+c.la+','+c.lo+')">🧭 Vai qui</span><span class="pill" onclick="map.setView(['+c.la+','+c.lo+'],14)">🔍 Zoom</span></div></div>';
    }
  } else {
    let h='';
    if(userPts.length){ h+='<div class="lbl" style="margin-top:4px;color:#7ff0ad">★ I tuoi punti ('+userPts.length+')</div>';
      userPts.forEach((c,i)=>{ h+='<div class="card" style="padding:8px 12px;margin:5px 0" onclick="selectPoint(\'user\','+i+')"><div class="row"><span class="dot" style="background:'+(SPCOL[c.sp]||'#8cff3b')+';box-shadow:0 0 0 2px #fff"></span>'+esc(c.nm)+'<div class="sp"></div><span class="muted">›</span></div></div>'; }); }
    if(!PUBLIC){   // catalogo waypoint storici: solo in locale, mai nella versione pubblica
      const groups={}; CATCH.forEach((c,i)=>{(groups[c.sp]=groups[c.sp]||[]).push(i);});
      ['tonno','alalunga','spada','foraggio','mark'].forEach(sp=>{ if(!groups[sp])return;
        h+='<div class="lbl" style="margin-top:8px"><span class="dot" style="background:'+SPCOL[sp]+'"></span> '+SPLBL[sp]+' ('+groups[sp].length+')</div>';
        groups[sp].slice(0,60).forEach(i=>{ h+='<div class="card" style="padding:8px 12px;margin:5px 0" onclick="selectPoint(\'hist\','+i+')"><div class="row">'+esc(CATCH[i].nm)+'<div class="sp"></div><span class="muted">›</span></div></div>'; });
      });
    } else if(!userPts.length){
      h+='<div class="card muted">Aggiungi i tuoi punti con ➕ (o tieni premuto sulla mappa). Premi 🎯 per gli <b>hot spot</b> di struttura nell\'area inquadrata.</div>';
    }
    body.innerHTML=h;
  }
}
function navTo2(la,lo){window.open('https://www.google.com/maps/dir/?api=1&destination='+la+','+lo,'_blank');}

/* ---- FAB ---- */
const baseOrder=['mare','sat','osm'];
document.getElementById('btnBase').onclick=()=>{ map.removeLayer(bases[baseKey]); baseKey=baseOrder[(baseOrder.indexOf(baseKey)+1)%baseOrder.length]; bases[baseKey].addTo(map); };
document.getElementById('btnBathy').onclick=e=>{ bathyOn=!bathyOn; if(bathyOn){chart.addTo(map);} else map.removeLayer(chart); e.currentTarget.style.background=bathyOn?'#173a5c':'#0d2137e6'; };
document.getElementById('btnCatch').onclick=e=>{ catchOn=!catchOn; if(catchOn){drawCatch();catchLayer.addTo(map);} else map.removeLayer(catchLayer); e.currentTarget.style.background=catchOn?'#173a5c':'#0d2137e6'; };
document.getElementById('btnCatch').style.background='#173a5c';
document.getElementById('btnBathy').style.background='#173a5c';
document.getElementById('btnHeat').onclick=e=>{ heatOn=!heatOn; if(heatOn){drawHeat();heatLayer.addTo(map);} else map.removeLayer(heatLayer); e.currentTarget.style.background=heatOn?'#173a5c':'#0d2137e6';
  document.getElementById('legend').style.display=heatOn?'block':'none';
  document.getElementById('legend').innerHTML='🔥 Zone calde: densità dei tuoi mark (giallo→rosso)'; };
map.on('moveend',()=>{ if(heatOn) drawHeat(); });
document.getElementById('btnSpot').onclick=()=>computeHotSpots();
let watchId=null, meMarker=null, meCircle=null, meCentered=false;
function showMe(p){ const ll=[p.coords.latitude,p.coords.longitude], acc=Math.max(0,p.coords.accuracy||0);
  if(!meMarker){
    meCircle=L.circle(ll,{radius:acc,color:'#22c8ff',weight:1,opacity:.6,fillColor:'#22c8ff',fillOpacity:.12}).addTo(map);
    meMarker=L.circleMarker(ll,{radius:7,color:'#fff',weight:2,fillColor:'#22c8ff',fillOpacity:1}).addTo(map);
  } else { meMarker.setLatLng(ll); meCircle.setLatLng(ll).setRadius(acc); }
  meMarker.bindTooltip('La tua posizione (±'+Math.round(acc)+' m)');
  if(!meCentered){ meCentered=true; map.setView(ll, acc>1000?11:15); }
}
document.getElementById('btnLocate').onclick=()=>{
  if(!navigator.geolocation){alert('GPS non disponibile su questo browser');return;}
  meCentered=false;
  // fix immediato fresco (no cache) + tracking continuo
  navigator.geolocation.getCurrentPosition(showMe,
    e=>alert('Posizione non ottenuta: '+e.message+'.\nNota: su PC/desktop la posizione è stimata dalla rete/IP e può essere molto imprecisa; su cellulare col GPS attivo è precisa.'),
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
  if(watchId==null) watchId=navigator.geolocation.watchPosition(showMe,()=>{},{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
};
/* aggiungi un tuo punto: FAB ➕ (al centro mappa) o long-press/tasto destro sulla mappa */
function addUserPoint(latlng){
  userPts.push({la:+(+latlng.lat).toFixed(5), lo:+(+latlng.lng).toFixed(5), sp:'mark', nm:'Nuovo punto'});
  saveUser();
  if(!catchOn){ catchOn=true; catchLayer.addTo(map); document.getElementById('btnCatch').style.background='#173a5c'; }
  drawCatch(); if(heatOn) drawHeat();
  selectPoint('user', userPts.length-1);
}
document.getElementById('btnAdd').onclick=()=>addUserPoint(map.getCenter());
map.on('contextmenu', e=>addUserPoint(e.latlng));

render();
/* versione pubblica: proponi subito gli hot spot per l'area iniziale */
if(PUBLIC){ map.whenReady(()=>setTimeout(computeHotSpots, 900)); }
/* service worker */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
